<!DOCTYPE html>
<html lang="vi"> <head>
    <meta charset="UTF-8">
    <title>{% block title %}Trang chủ{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="d-flex flex-column min-vh-100 bg">

    <header>
        <nav class="navbar navbar-expand-lg bg-primary" data-bs-theme="dark"> <div class="container-fluid">
                <a class="navbar-brand text-white" href="{{ url_for('index') }}">
                    Discounts Management
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav me-auto">
                        {% block header_nav_items %}
                        {% endblock %}
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <section class="container my-4">
        {% block content %}
        {% endblock %}
    </section>

    <footer class="footer mt-auto bg-body-tertiary text-center text-white">
        <div class="p-3 bg-primary">
            <i>© 2026 Copyright - Developed by Ngàn Thành Phú, Hoàng Phi Hùng, Dương Lê Kim Phụng</i>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
